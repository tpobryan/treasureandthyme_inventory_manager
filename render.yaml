services:
  - type: web
    name: auctionninja-local-app
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: waitress-serve --host 0.0.0.0 --port $PORT app:app
    envVars:
      - key: OPENAI_MODEL
        value: gpt-4.1-mini
      - key: APP_LOGIN_USERNAME
        value: admin
      - key: FLASK_SECRET_KEY
        generateValue: true
      - key: OPENAI_API_KEY
        sync: false
      - key: APP_LOGIN_PASSWORD
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: FTP_HOST
        sync: false
      - key: FTP_PORT
        value: "21"
      - key: FTP_USERNAME
        sync: false
      - key: FTP_PASSWORD
        sync: false
      - key: FTP_TLS
        value: "false"
    disk:
      name: auctionninja-data
      mountPath: /opt/render/project/src/data
      sizeGB: 5
