<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Saved</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; margin: 0; background: #f7f7f8; color: #222; }
    .wrap { max-width: 900px; margin: 0 auto; padding: 24px; }
    .card { background: #fff; border-radius: 16px; padding: 24px; box-shadow: 0 4px 20px rgba(0,0,0,.08); }
    .button { display:inline-block; background:#111827; color:#fff; padding:12px 18px; border-radius:12px; text-decoration:none; }
    table { width:100%; border-collapse: collapse; margin-top: 16px; }
    td, th { text-align:left; padding:10px; border-bottom: 1px solid #ececec; vertical-align: top; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>Saved lot {{ lot_number }}</h1>
      <p>The row was added to your local CSV file.</p>
      <table>
        <tr><th>Field</th><th>Value</th></tr>
        {% for key, value in row.items() %}
          <tr><td>{{ key }}</td><td>{{ value }}</td></tr>
        {% endfor %}
      </table>
      <p style="margin-top:18px;"><a class="button" href="{{ url_for('main.index') }}">Add Another Item</a></p>
    </div>
  </div>
</body>
</html>
