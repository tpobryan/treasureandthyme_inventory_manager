<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sign In</title>
  <style>
    :root {
      --bg: #f6f7fb;
      --card: #ffffff;
      --border: #d9deea;
      --text: #1f2937;
      --muted: #6b7280;
      --accent: #2563eb;
      --accent-hover: #1d4ed8;
      --radius: 14px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 20px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .card {
      width: min(100%, 420px);
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 22px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.04);
    }

    h1 {
      margin: 0 0 8px;
      font-size: 1.6rem;
      line-height: 1.2;
    }

    .sub {
      margin: 0 0 18px;
      color: var(--muted);
      font-size: 0.96rem;
      line-height: 1.45;
    }

    .flash {
      margin-bottom: 16px;
      padding: 12px 14px;
      border-radius: 10px;
      border: 1px solid #fecaca;
      background: #fef2f2;
      color: #991b1b;
      font-size: 0.96rem;
    }

    .field {
      margin-bottom: 14px;
    }

    label {
      display: block;
      font-weight: 600;
      margin-bottom: 7px;
    }

    input {
      width: 100%;
      padding: 11px 12px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: #fff;
      font: inherit;
      color: inherit;
    }

    button {
      appearance: none;
      border: 0;
      border-radius: 10px;
      padding: 12px 18px;
      font: inherit;
      font-weight: 600;
      cursor: pointer;
      background: var(--accent);
      color: white;
      width: 100%;
    }

    button:hover {
      background: var(--accent-hover);
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Sign In</h1>
    <p class="sub">This app is protected for remote use. Sign in with the configured account to continue.</p>

    {% with messages = get_flashed_messages() %}
      {% if messages %}
        {% for message in messages %}
          <div class="flash">{{ message }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <form method="post">
      <input type="hidden" name="next" value="{{ next_url }}">
      <div class="field">
        <label for="username">Username</label>
        <input id="username" name="username" type="text" value="{{ username }}" autocomplete="username">
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input id="password" name="password" type="password" autocomplete="current-password">
      </div>
      <button type="submit">Sign In</button>
    </form>
  </div>
</body>
</html>
